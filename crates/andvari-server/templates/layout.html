<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Andvari{% endblock %}</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/assets/andvari.css">
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" aria-label="Primary">
        <a class="brand" href="/">
          <span class="logo" aria-hidden="true">
            <svg width="14" height="16" viewBox="0 0 14 16" fill="none"><path d="M7 0.5 12.5 2.4v4.9c0 3.7-2.2 6.5-5.5 8.2-3.3-1.7-5.5-4.5-5.5-8.2V2.4L7 .5Z" fill="currentColor"/></svg>
          </span>
          <span>Andvari</span>
        </a>

        <nav class="nav-section">
          <a class="nav-link {% if active == "home" %}active{% endif %}" href="/">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg>
            <span>Home</span>
          </a>
          <div class="nav-label">VAULT</div>
          <a class="nav-link {% if active == "secrets" %}active{% endif %}" href="/secrets">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2 20 5v6c0 5-4 9-8 11-4-2-8-6-8-11V5l8-3Z"/><path d="m9 11 2 2 4-4"/></svg>
            <span>Secrets</span>
          </a>
          <a class="nav-link {% if active == "tokens" %}active{% endif %}" href="/tokens">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="8" cy="15" r="4"/><path d="m11 12 9-9"/><path d="m16 7 3 3"/></svg>
            <span>Tokens</span>
          </a>
          <a class="nav-link {% if active == "audit" %}active{% endif %}" href="/audit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h14v16H4z"/><path d="M7 8h8M7 12h8M7 16h4"/><circle cx="19" cy="17" r="3"/></svg>
            <span>Audit Log</span>
          </a>
          <a class="nav-link {% if active == "approvals" %}active{% endif %}" href="/approvals">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m14 3 7 7-3 3-7-7z"/><path d="m11 6-7 7 4 4 7-7"/><path d="M2 22h12"/></svg>
            <span>Approvals</span>
            <span class="nav-spacer"></span>
            <span class="badge">2</span>
          </a>
          <div class="nav-label">MANAGE</div>
          <a class="nav-link" href="#">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span>Workspaces</span>
          </a>
          <a class="nav-link" href="#">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2a2 2 0 1 1-4 0V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 1 1 3.8 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H2.4a2 2 0 1 1 0-4h.2a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1A2 2 0 1 1 6.6 4.2l.1.1a1.7 1.7 0 0 0 1.9.3h.1a1.7 1.7 0 0 0 .9-1.6V2.8a2 2 0 1 1 4 0V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 1 1 19.4 7l-.1.1A1.7 1.7 0 0 0 19 9"/></svg>
            <span>Settings</span>
          </a>
        </nav>

        <div class="profile">
          <span class="avatar">JD</span>
          <div>
            <strong>Jane Doe</strong>
            <span>owner</span>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <a class="project-select" href="#">
            <span class="tiny-logo">SF</span>
            <span>Spirit Finder</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
          </a>
          <div class="search" role="search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <span>Search or run command...</span>
            <span class="kbd">⌘ K</span>
          </div>
          <div class="top-actions">
            <button class="icon-button" type="button" aria-label="Docs">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5z"/><path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20"/></svg>
            </button>
            <button class="icon-button" type="button" aria-label="Notifications">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
            </button>
            <button class="avatar-pill" type="button" aria-label="Account">
              <span class="avatar-small">JD</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m6 9 6 6 6-6"/></svg>
            </button>
          </div>
        </header>

        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
