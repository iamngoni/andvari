<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Andvari{% endblock %}</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/assets/andvari.css">
  </head>
  <body data-workspace="{{ workspace_slug }}">
    <div class="app">
      <aside class="sidebar" aria-label="Primary">
        <a class="brand" href="/">
          <span class="logo" aria-hidden="true">
            <svg width="14" height="16" viewBox="0 0 14 16" fill="none"><path d="M7 0.5 12.5 2.4v4.9c0 3.7-2.2 6.5-5.5 8.2-3.3-1.7-5.5-4.5-5.5-8.2V2.4L7 .5Z" fill="currentColor"/></svg>
          </span>
          <span>Andvari</span>
        </a>

        <nav class="nav-section">
          <a class="nav-link {% if active == "home" %}active{% endif %}" href="/">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg>
            <span>Home</span>
          </a>
          <div class="nav-label">Vault</div>
          <a class="nav-link {% if active == "secrets" %}active{% endif %}" href="/secrets">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2 20 5v6c0 5-4 9-8 11-4-2-8-6-8-11V5l8-3Z"/><path d="m9 11 2 2 4-4"/></svg>
            <span>Secrets</span>
          </a>
          <a class="nav-link {% if active == "tokens" %}active{% endif %}" href="/tokens">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="8" cy="15" r="4"/><path d="m11 12 9-9"/><path d="m16 7 3 3"/></svg>
            <span>Tokens</span>
          </a>
          <a class="nav-link {% if active == "audit" %}active{% endif %}" href="/audit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h14v16H4z"/><path d="M7 8h8M7 12h8M7 16h4"/><circle cx="19" cy="17" r="3"/></svg>
            <span>Audit log</span>
          </a>
          <a class="nav-link {% if active == "approvals" %}active{% endif %}" href="/approvals">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m14 3 7 7-3 3-7-7z"/><path d="m11 6-7 7 4 4 7-7"/><path d="M2 22h12"/></svg>
            <span>Approvals</span>
          </a>
        </nav>

        <div class="profile">
          <span class="avatar">{{ user_initials }}</span>
          <div>
            <strong>{{ user_name }}</strong>
            <form method="post" action="/v1/auth/logout" style="margin:0">
              <button type="submit" class="link-button">Sign out</button>
            </form>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="project-select" title="Workspace">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
            <span>{{ workspace_name }}</span>
          </div>
          <div class="search" role="search" aria-label="Search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <span class="spacer">Search</span>
            <span class="kbd">⌘K</span>
          </div>
          <div class="top-actions">
            <button class="avatar-pill" type="button" aria-label="Account">
              <span class="avatar-small">{{ user_initials }}</span>
            </button>
          </div>
        </header>

        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
